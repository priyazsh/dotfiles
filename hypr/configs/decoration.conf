decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

        blur {
        enabled = true

        size = 10
        passes = 4

        noise = 0.02
        contrast = 1.1
        brightness = 0.9

        vibrancy = 0.25
        vibrancy_darkness = 0.4
    }
}
